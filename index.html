<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>Tetris</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <!-- タイトル画面 -->
  <div id="start-screen" class="active">
    <h1 class="title">TETRIS</h1>
    <p class="subtitle">Press ENTER to Start</p>
    <div class="bg-grid"></div>
  </div>
  <!-- ゲーム画面 -->
  <div id="game-area" class="container" style="display:none;">
    <div class="side-panel">
      <div class="hold-box">
        <p>Hold</p>
        <canvas id="hold" width="80" height="80"></canvas>
      </div>

      <div id="controls-inline">
        <b>操作</b><br>
        ← → / A D：移動<br>
        ↓ / S：加速<br>
        ↑ / W / Space：落とす<br>
        Q ：左回転<br>
        E ：右回転<br>
        C / Shift：ホールド
      </div>
    </div>

    <div class="main-panel">
      <p>Level: <span id="level">1</span> | Score: <span id="score">0</span></p>
      <canvas id="tetris" width="300" height="600"></canvas>
    </div>

    <div class="next-box">
      <p>Next</p>
      <canvas class="next" width="80" height="80"></canvas>
      <canvas class="next" width="80" height="80"></canvas>
      <canvas class="next" width="80" height="80"></canvas>
    </div>
  </div>
  <!-- ゲームオーバー画面 -->
  <div id="gameover-screen" style="display:none;">
    <div class="gameover-content">
      <h2 class="gameover-title">GAME OVER</h2>
      <div class="final-stats">
        <div class="stat-item">
          <span class="label">SCORE</span>
          <span id="final-score" class="value">0</span>
        </div>
        <div class="stat-item">
          <span class="label">LEVEL</span>
          <span id="final-level" class="value">1</span>
        </div>
      </div>
      <div class="button-group">
        <button id="retry-btn" class="glow-btn">RETRY</button>
        <button id="title-btn" class="glow-btn secondary">TITLE</button>
      </div>
    </div>
  </div>
  <script src="js/constants.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/view.js"></script>
  <script src="js/main.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/controls.js"></script>
</body>

</html>
